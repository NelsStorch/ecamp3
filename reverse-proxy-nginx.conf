user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
events {
  worker_connections  1024;
}
http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  resolver 127.0.0.11;
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log  main;
  sendfile on;
  keepalive_timeout 65;
  
  upstream frontend {
      server frontend:3000;
  }
  
  upstream api {
      server api:3001;
  }
  
  upstream http-cache {
      server http-cache:8080;
  }
  
  upstream print {
      server print:3003;
  }
  
  upstream mail {
      server mail:1080;
  }
  
  upstream pgadmin {
      server pg-admin:80;
  }
  
  server {
    listen 3000;
    server_name localhost;

    location / {
      proxy_pass http://frontend;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
    
    location /api/ {
      # the Set-Cookie: XDEBUG_SESSION=PHPSTORM; path=/; SameSite=Lax header is set too many times
      # temporary workaround from https://stackoverflow.com/a/27551259
      proxy_buffer_size 128k;
      proxy_buffers 4 256k;
      proxy_busy_buffers_size 256k;
      proxy_set_header X-Forwarded-Prefix /api;
      proxy_pass http://api/;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
    
    location /print {
      proxy_pass http://print;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
    
    location /mail {
      proxy_pass http://mail;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /pgadmin/ {
      proxy_set_header X-Script-Name /pgadmin;
      proxy_set_header Host $host;
      proxy_pass http://pg-admin/;
      proxy_redirect off;
    }
  }
  server {
    listen 3004;
    server_name localhost;

    location / {
      proxy_pass http://frontend;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
    
    location /api/ {
      # the Set-Cookie: XDEBUG_SESSION=PHPSTORM; path=/; SameSite=Lax header is set too many times
      # temporary workaround from https://stackoverflow.com/a/27551259
      proxy_buffer_size 128k;
      proxy_buffers 4 256k;
      proxy_busy_buffers_size 256k;
      proxy_set_header X-Forwarded-Prefix /api;
      proxy_pass http://http-cache/;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
    
    location /print {
      proxy_pass http://print;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
    
    location /mail {
      proxy_pass http://mail;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
