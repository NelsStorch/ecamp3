name: check-renovate-config.yml
on:
  push:
    paths:
      - .github/workflows/check-renovate-config.yml
      - renovate.json
  pull_request:
    paths:
      - .github/workflows/check-renovate-config.yml
      - renovate.json

jobs:
  validate-renovate-config:
    name: 'renovate: validate config'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - run: docker run --rm -e LOG_LEVEL=debug -v "$PWD:/workspace" -w /workspace renovate/renovate:$RENOVATE_VERSION --platform=local
        env:
          # renovate: datasource=docker depName=renovate/renovate
          RENOVATE_VERSION: 43.195.8
