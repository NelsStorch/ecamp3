          description: 'User input for email verification.'
          type:
            - 'null'
            - string
          writeOnly: true
        user:
          anyOf:
            -
              $ref: '#/components/schemas/User'
            -
              type: 'null'
          readOnly: true
      required:
        - email
        - roles
      type: object
