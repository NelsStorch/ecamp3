    Profile:
      properties:
        abbreviation:
          description: 'The default abbreviation in the avatar.'
          example: AB
          maxLength: 2
          type:
            - 'null'
            - string
        color:
          description: 'The default color of the avatar as a hex color string.'
          example: '#4DBB52'
          maxLength: 8
          pattern: '^(#[0-9a-zA-Z]{6})$'
          type:
            - 'null'
            - string
        displayName:
          readOnly: true
          type:
            - 'null'
            - string
        email:
          description: 'Unique email of the user.'
          example: bi-pi@example.com
          externalDocs:
            url: 'https://schema.org/email'
          format: email
          maxLength: 64
          type: string
        firstname:
          description: "The user's (optional) first name."
          example: Robert
          maxLength: 64
          type:
            - 'null'
            - string
        id:
          description: 'An internal, unique, randomly generated identifier of this entity.'
          example: 1a2b3c4d
          maxLength: 16
          readOnly: true
          type: string
        language:
          description: 'The optional preferred language of the user, as an ICU language code.'
          enum:
            - de
            - de-CH-scout
            - en
            - en-CH-scout
            - fr
            - fr-CH-scout
            - it
            - it-CH-scout
            - rm
            - rm-CH-scout
          example: en
          maxLength: 20
          type:
            - 'null'
            - string
