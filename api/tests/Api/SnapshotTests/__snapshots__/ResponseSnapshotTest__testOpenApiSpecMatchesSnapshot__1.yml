          description: |-
            The legal name of the user, for printing on legally relevant
            documents. Falls back to the nickname if not complete.
          example: 'Robert Baden-Powell'
          readOnly: true
          type:
            - 'null'
            - string
        newEmail:
          description: 'New email.'
          example: bi-pi@example.com
          externalDocs:
            url: 'https://schema.org/email'
          format: email
          type:
            - 'null'
            - string
        nickname:
          description: "The user's (optional) nickname or scout name."
          example: Bi-Pi
          maxLength: 32
          type:
            - 'null'
            - string
        roles:
          default:
            - ROLE_USER
          description: 'The technical roles that this person has in the eCamp application.'
          items:
            type:
              - 'null'
              - string
          readOnly: true
          type: array
        surname:
          description: "The user's (optional) last name."
          example: Baden-Powell
          maxLength: 64
          type:
            - 'null'
            - string
        untrustedEmail:
          description: 'Untrusted email.'
          maxLength: 64
          type:
            - 'null'
            - string
