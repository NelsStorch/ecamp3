    Camp:
      properties:
        activities:
          items:
            $ref: '#/components/schemas/Activity'
          readOnly: true
          type: array
        addressCity:
          description: 'The name of the town where the camp will take place.'
          example: Hintertüpfingen
          maxLength: 128
          type:
            - 'null'
            - string
        addressName:
          description: 'A textual description of the location of the camp.'
          example: 'Wiese hinter der alten Mühle'
          maxLength: 128
          type:
            - 'null'
            - string
        addressStreet:
          description: 'The street name and number (if any) of the location of the camp.'
          example: 'Schönriedweg 23'
          maxLength: 128
          type:
            - 'null'
            - string
        addressZipcode:
          description: 'The zipcode of the location of the camp.'
          example: '1234'
          maxLength: 128
          type:
            - 'null'
            - string
        campCollaborations:
          items:
            $ref: '#/components/schemas/CampCollaboration'
          readOnly: true
          type: array
        campPrototype:
          anyOf:
            -
              $ref: '#/components/schemas/Camp'
            -
              type: 'null'
        campPrototypeId:
          description: |-
            The id of the camp that was used as a template for creating this camp. Internal for now, is
            not published through the API.
          maxLength: 16
          type:
            - 'null'
            - string
        campRootContentNodes:
          items:
            $ref: '#/components/schemas/CampRootContentNode'
          type: array
        categories:
          items:
            $ref: '#/components/schemas/Category'
          readOnly: true
          type: array
        checklists:
          items:
            $ref: '#/components/schemas/Checklist'
          readOnly: true
          type: array
        coachName:
          description: 'The name of the Y+S coach who is in charge of the camp.'
          example: 'Albert Anderegg'
          maxLength: 64
          type:
            - 'null'
            - string
        courseKind:
          description: 'The official name for the type of this course.'
          example: 'PBS AG 123-23'
          maxLength: 64
          type:
            - 'null'
            - string
        courseNumber:
          description: 'The official course number, identifying this course.'
          example: 'PBS AG 123-23'
          maxLength: 64
          type:
            - 'null'
            - string
        creator:
          $ref: '#/components/schemas/User'
        id:
          description: 'An internal, unique, randomly generated identifier of this entity.'
          example: 1a2b3c4d
          maxLength: 16
          readOnly: true
          type: string
        isPrototype:
          default: false
          description: 'Whether this camp may serve as a template for creating other camps.'
          example: true
          readOnly: true
          type: boolean
        isPublic:
          default: false
          description: |-
            Automatically set to the value (isShared || isPrototype). Used for more efficient
            database filtering operations, since OR queries are very expensive to compute.
          type: boolean
        isShared:
          default: false
          description: |-
            Whether the programme of this camp is publicly available to anyone (including
            personal data such as camp collaborations, personal material lists,
            responsibilities and comments).
          example: true
          type: boolean
        kind:
          description: 'Rough categorization of the camp (house, tent, traveling, summer, autumn).'
          example: Zeltlager
          maxLength: 64
          type:
            - 'null'
            - string
        materialItems:
          items:
            $ref: '#/components/schemas/MaterialItem'
          type: array
        materialLists:
          items:
            $ref: '#/components/schemas/MaterialList'
          readOnly: true
          type: array
        motto:
          description: "The thematic topic (if any) of the camp's programme and storyline."
          example: Piraten
          maxLength: 128
          type:
            - 'null'
            - string
        organizer:
          description: 'The name of the organization which plans and carries out the camp.'
          example: 'Pfadi Luftig'
          maxLength: 64
          type:
            - 'null'
            - string
        periods:
          items:
            $ref: '#/components/schemas/Period'
          readOnly: true
          type: array
        printYSLogoOnPicasso:
          default: false
          description: 'Whether the Y+S logo should be printed on the picasso of this camp.'
          example: true
          type: boolean
        profiles:
          items:
            $ref: '#/components/schemas/Profile'
          readOnly: true
          type: array
        progressLabels:
          items:
            $ref: '#/components/schemas/ActivityProgressLabel'
          readOnly: true
          type: array
        sharedBy:
          anyOf:
            -
              $ref: '#/components/schemas/User'
            -
              type: 'null'
          readOnly: true
        sharedSince:
          description: 'Date and time when the camp was last set to be shared publicly.'
          example: '2025-10-01T00:00:00+00:00'
          format: date-time
          type:
            - 'null'
            - string
        shortTitle:
          description: |-
            An optional short title for the camp. Can be used in the UI where space is tight. If
            not present, frontends may auto-shorten the title if the shortTitle is not set.
          example: 'SoLa 2022'
          maxLength: 32
          type:
            - 'null'
            - string
        title:
          description: |-
            The full title of the camp. Used for identifying the camp in lists of camps, so
            this should include all necessary information to distinguish this camp from
            other camps that the collaborators are part of.
          example: 'Abteilungs-Sommerlager 2022'
          maxLength: 32
          type: string
        trainingAdvisorName:
          description: 'The name of the training advisor who is in charge of the course.'
          example: 'Albert Anderegg'
          maxLength: 64
          type:
            - 'null'
            - string
        userCamps:
          items:
            $ref: '#/components/schemas/UserCamp'
          type: array
      required:
        - activities
        - campCollaborations
        - campRootContentNodes
        - categories
        - checklists
        - isPublic
        - materialItems
        - materialLists
        - periods
        - printYSLogoOnPicasso
        - progressLabels
        - title
        - userCamps
      type: object
